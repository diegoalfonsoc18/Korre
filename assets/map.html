<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
    }
    .marker-popup {
      font-size: 14px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    const map = L.map('map').setView([4.7110, -74.0055], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
      maxZoom: 19,
    }).addTo(map);

    let pickupMarker = null;
    let deliveryMarker = null;
    let currentMode = null;

    const redIcon = L.icon({
      iconUrl: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMiIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDMyIDQwIj48cGF0aCBkPSJNMTYgMEM5IDAgNCAxMCA0IDE2YzAgOCAxMiAyNCAx2MyAyNHMxMi0xNiAxMi0yNGMwLTYtNS0xNi0xMi0xNnoiIGZpbGw9IiNGRjVBNUEiLz48Y2lyY2xlIGN4PSIxNiIgY3k9IjE1IiByPSI1IiBmaWxsPSJ3aGl0ZSIvPjwvc3ZnPg==',
      iconSize: [32, 40],
      iconAnchor: [16, 40],
      popupAnchor: [0, -40],
    });

    const greenIcon = L.icon({
      iconUrl: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMiIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDMyIDQwIj48cGF0aCBkPSJNMTYgMEM5IDAgNCAxMCA0IDE2YzAgOCAxMiAyNCAx2MyAyNHMxMi0xNiAxMi0yNGMwLTYtNS0xNi0xMi0xNnoiIGZpbGw9IiNDOEZGMDAiLz48Y2lyY2xlIGN4PSIxNiIgY3k9IjE1IiByPSI1IiBmaWxsPSJ3aGl0ZSIvPjwvc3ZnPg==',
      iconSize: [32, 40],
      iconAnchor: [16, 40],
      popupAnchor: [0, -40],
    });

    map.on('click', function(e) {
      const { lat, lng } = e.latlng;
      const coords = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;

      if (currentMode === 'pickup') {
        if (pickupMarker) map.removeLayer(pickupMarker);
        pickupMarker = L.marker([lat, lng], { icon: redIcon }).addTo(map).bindPopup('Recogida');
        window.ReactNativeWebView.postMessage(JSON.stringify({
          type: 'pickup',
          coords: coords,
          latitude: lat,
          longitude: lng
        }));
      } else if (currentMode === 'delivery') {
        if (deliveryMarker) map.removeLayer(deliveryMarker);
        deliveryMarker = L.marker([lat, lng], { icon: greenIcon }).addTo(map).bindPopup('Entrega');
        window.ReactNativeWebView.postMessage(JSON.stringify({
          type: 'delivery',
          coords: coords,
          latitude: lat,
          longitude: lng
        }));
      }
    });

    window.setMode = function(mode) {
      currentMode = mode;
    };

    window.getMarkers = function() {
      return {
        pickup: pickupMarker ? { lat: pickupMarker.getLatLng().lat, lng: pickupMarker.getLatLng().lng } : null,
        delivery: deliveryMarker ? { lat: deliveryMarker.getLatLng().lat, lng: deliveryMarker.getLatLng().lng } : null,
      };
    };
  </script>
</body>
</html>
